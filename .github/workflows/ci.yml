name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-api:
    name: Test API Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package.json
      - name: Install API dependencies
        run: cd api && npm install
      - name: Run API tests
        run: cd api && npm test
        env:
          JWT_ACCESS_SECRET: test_access_secret_12345678901234567890
          JWT_REFRESH_SECRET: test_refresh_secret_12345678901234567890
          MONGODB_URI: mongodb://localhost:27017/test
          REDIS_URL: redis://localhost:6379

  test-worker:
    name: Test Worker Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package.json
      - name: Install Worker dependencies
        run: cd worker && npm install
      - name: Run Worker tests
        run: cd worker && npm test
        env:
          OPENAI_API_KEY: mock_openai_key
          HF_API_KEY: mock_hf_key
          MINIO_ENDPOINT: localhost
          MINIO_PORT: '9000'
          MINIO_USE_SSL: 'false'
          MINIO_ACCESS_KEY: test
          MINIO_SECRET_KEY: test
          MINIO_BUCKET: test
          MONGODB_URI: mongodb://localhost:27017/test
          REDIS_URL: redis://localhost:6379

  build-images:
    name: Build & Verify Docker Images
    runs-on: ubuntu-latest
    needs: [test-api, test-worker]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build ./api -t camarin-api:${{ github.sha }}
      - name: Build Worker image
        run: docker build ./worker -t camarin-worker:${{ github.sha }}
      - name: Build Frontend image
        run: docker build ./frontend -t camarin-frontend:${{ github.sha }}

  deploy-render:
    name: Deploy to Render Cloud
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Deploy Hook (API)
        env:
          HOOK_URL: ${{ secrets.RENDER_API_DEPLOY_HOOK }}
        if: env.HOOK_URL != ''
        run: curl -s -X POST "$HOOK_URL"

      - name: Trigger Render Deploy Hook (Worker)
        env:
          HOOK_URL: ${{ secrets.RENDER_WORKER_DEPLOY_HOOK }}
        if: env.HOOK_URL != ''
        run: curl -s -X POST "$HOOK_URL"

      - name: Trigger Render Deploy Hook (Frontend)
        env:
          HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
        if: env.HOOK_URL != ''
        run: curl -s -X POST "$HOOK_URL"